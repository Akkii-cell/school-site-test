<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>港区白金の丘中学校 第7学年 共有サイト</title>
<link rel="icon" href="ChatGPT Image 2026年6月28日 00_40_40.png">
<style>
:root {
  color-scheme: light;
  --bg: #f5f5f7;
  --surface: rgba(255, 255, 255, 0.7);
  --surface-solid: #ffffff;
  --border: rgba(15, 23, 42, 0.08);
  --text: #111827;
  --muted: #6b7280;
  --accent: #0071e3;
  --shadow: 0 12px 32px rgba(15, 23, 42, 0.04);
  --radius-xl: 24px;
  --radius-lg: 18px;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
  color: var(--text);
  background: linear-gradient(135deg, #f5f5f7 0%, #e8ecf3 100%);
  background-attachment: fixed;
  -webkit-font-smoothing: antialiased;
}

button, input, select, textarea { font: inherit; width: 100%; box-sizing: border-box; }
button { border: none; cursor: pointer; }

/* 💻 PCでも横幅を小さくせず、画面いっぱいに心地よく広げるコンテナ設定 */
.shell {
  width: 100%;
  max-width: 1400px; /* 大画面の魅力を活かすようワイドに拡張 */
  margin: 0 auto;
  padding: 32px 24px 140px;
}

.frosted {
  background: var(--surface);
  border: 1px solid rgba(255, 255, 255, 0.4);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
}

.hero-header-container {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 32px;
  margin-bottom: 24px;
}

.hero-card { display: flex; align-items: center; gap: 16px; }
.hero-title { font-size: 1.5rem; margin: 0; font-weight: 800; letter-spacing: -0.02em; }
.hero-lead { font-size: 0.9rem; margin: 4px 0 0 0; color: var(--muted); }

.toolbar { padding: 16px 24px; margin-bottom: 24px; }
.toolbar-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.toolbar-row .ghost-button {
  width: auto;
  min-height: 44px;
  padding: 0 24px;
  font-size: 1rem;
  background: rgba(255, 255, 255, 0.6);
  border-radius: 999px;
  font-weight: 600;
}

.date-display { font-size: 1.25rem; font-weight: 700; text-align: center; flex: 1; }

.panel { padding: 28px; margin-bottom: 24px; }
.panel-title { font-size: 1.3rem; margin-bottom: 20px; font-weight: 700; }

.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* 📑 投稿カード：2カラム等で並べず、流れるような美しい全幅ストリームに */
.post-card {
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: var(--radius-xl);
  padding: 28px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
}

.post-body { color: #344054; line-height: 1.8; white-space: pre-wrap; overflow-wrap: anywhere; margin-bottom: 20px; font-size: 1.05rem; }

.button, .ghost-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
  font-weight: 700;
  transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
}
.button { background: linear-gradient(135deg, #0071e3, #1d80e6); color: #fff; border-radius: 999px; }
.ghost-button { background: rgba(0, 0, 0, 0.04); color: var(--text); border-radius: 999px; }

/* 📱 スマホズレ絶対防止版・半透明セパレートボトムナビ */
.admin-footer { 
  position: fixed; 
  bottom: 24px; 
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000; 
  display: flex; 
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: rgba(255, 255, 255, 0.35);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  padding: 8px 16px;
  border-radius: 999px;
  border: 1px solid rgba(255, 255, 255, 0.5);
  box-shadow: 0 12px 38px rgba(0, 0, 0, 0.08);
  width: max-content;
  max-width: 95vw;
  flex-wrap: nowrap; /* 縦割れ・折り返しを絶対に拒否 */
}

.admin-footer .ghost-button {
  min-height: 42px;
  padding: 0 20px;
  font-size: 0.95rem;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.8);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
  white-space: nowrap;
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text);
  border: 1px solid rgba(255, 255, 255, 0.6);
}
.admin-footer .ghost-button:hover { background: rgba(255, 255, 255, 0.95); transform: translateY(-1px); }

/* 🚀 リアクション群のボタンスタイル */
.reaction-container {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 20px;
  flex-wrap: wrap;
}
.reaction-btn {
  padding: 0 16px;
  min-height: 38px;
  font-size: 0.9rem;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  width: auto;
  background: rgba(0, 0, 0, 0.04);
  border: 1px solid transparent;
}
.reaction-icon-img {
  width: 18px;
  height: 18px;
  object-fit: contain;
}

/* モーダル・その他 */
.modal { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; padding: 20px; background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 2000; }
.modal.hidden { display: none; }
.modal-panel { width: min(460px, 100%); max-height: 85vh; overflow-y: auto; padding: 28px; border-radius: 24px; background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: var(--shadow); }
.modal-title { font-size: 1.25rem; margin-bottom: 18px; font-weight: 700; }

.toast { position: fixed; left: 50%; bottom: 100px; transform: translateX(-50%); padding: 12px 24px; border-radius: 999px; background: rgba(17, 24, 39, 0.85); color: #fff; opacity: 0; pointer-events: none; z-index: 3000; transition: opacity 0.2s; font-size: 0.9rem; font-weight: 600; }
.toast.show { opacity: 1; }

.hamburger-menu { position: fixed; top: 0; left: -100%; width: 280px; height: 100vh; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); z-index: 1500; transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1); padding: 32px 24px; box-shadow: 20px 0 40px rgba(0,0,0,0.03); }
.hamburger-menu.active { left: 0; }
.hamburger-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.15); z-index: 1400; backdrop-filter: blur(4px); }
.hamburger-overlay.active { display: block; }
.hamburger-button { width: 44px; height: 44px; background: rgba(255, 255, 255, 0.6); border: 1px solid var(--border); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

/* 📱 スマホ専用ズレ調整メディアクエリ */
@media (max-width: 768px) {
  .shell { padding: 16px 12px 130px; }
  .hero-header-container { padding: 14px 18px; margin-bottom: 16px; }
  .hero-title { font-size: 1.2rem; }
  .toolbar { padding: 12px; margin-bottom: 16px; }
  .date-display { font-size: 1rem; }
  .toolbar-row .ghost-button { min-height: 38px; padding: 0 14px; font-size: 0.85rem; }
  
  /* スマホの極小画面でも絶対に改行・ハズレを起こさせないためのフォント縮小調整 */
  .admin-footer { bottom: 16px; padding: 6px 10px; gap: 6px; }
  .admin-footer .ghost-button { padding: 0 10px; font-size: 0.78rem; min-height: 36px; gap: 4px; }
  
  .form-grid-2 { grid-template-columns: 1fr; }
  .post-card { padding: 18px; margin-bottom: 16px; }
}
</style>
</head>
<body>

<div class="modal" id="loginModal">
<div class="modal-panel">
  <h2 class="modal-title">ログイン / 新規登録</h2>
  <form id="emailLoginForm" style="display: grid; gap: 12px;">
    <input id="emailInput" type="email" placeholder="メール" required style="padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; background: #fff;">
    <input id="passwordInput" type="password" placeholder="パスワード" required style="padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; background: #fff;">
    <button type="submit" class="button" style="width: 100%;">ログイン / 登録</button>
  </form>
</div>
</div>

<div class="modal hidden" id="termsModal">
<div class="modal-panel">
  <h2 class="modal-title">利用規約・ポリシー</h2>
  <div style="background:rgba(0,0,0,0.03); padding:14px; border-radius:12px; max-height:180px; overflow-y:auto; font-size:0.8rem; margin-bottom:14px; line-height: 1.6;">
    <p>学校予定共有サイトの利用規約です。不適切な投稿や荒らし行為はアカウント停止の対象となります。</p>
  </div>
  <form id="termsForm" style="display: grid; gap: 14px;">
    <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; cursor: pointer;">
      <input id="termsCheckbox" type="checkbox" required style="width: 18px; height: 18px; margin: 0;">
      <span>規約に同意する</span>
    </label>
    <button type="submit" class="button" style="width: 100%;">次へ進む</button>
  </form>
</div>
</div>

<div class="modal hidden" id="setupModal">
<div class="modal-panel">
  <h2 class="modal-title">初期セットアップ</h2>
  <form id="setupForm" style="display: grid; gap: 16px;">
    <input id="setupName" type="text" maxlength="30" placeholder="お名前" required style="padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; background:#fff;">
    <select id="setupClass" required style="padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; background:#fff;">
      <option value="">クラスを選択</option>
      <option value="7-1">7-1組</option>
      <option value="7-2">7-2組</option>
    </select>
    <button type="submit" class="button" style="width: 100%;">登録して承認申請</button>
  </form>
</div>
</div>

<div class="modal hidden" id="pendingApprovalModal">
<div class="modal-panel" style="text-align: center;">
  <h2 class="modal-title" style="color: var(--accent);">⏳ 承認待ち</h2>
  <p style="margin-bottom: 20px; font-size:0.95rem; line-height:1.6;">アカウント申請中です。<br>管理者の承認をお待ちください。</p>
  <button type="button" id="pendingLogoutButton" class="ghost-button" style="width: 100%;">ログイン画面に戻る</button>
</div>
</div>

<div class="modal hidden" id="suspendedModal">
<div class="modal-panel" style="text-align: center;">
  <h2 class="modal-title" style="color: #d92d20;">⚠️ アカウント停止中</h2>
  <p style="font-size: 0.9rem; margin-bottom: 16px; color: var(--muted);">アクセスが制限されています。</p>
  <button type="button" id="suspendedLogoutButton" class="ghost-button" style="width: 100%;">ログアウト</button>
</div>
</div>

<div class="hamburger-menu" id="hamburgerMenu">
<h3 style="margin-top:0; margin-bottom: 24px; font-weight:800;">カテゴリ別表示</h3>
<div style="display:grid; gap:12px;">
  <button class="ghost-button" onclick="window.selectCategory('all')" style="justify-content:flex-start; width:100%;">📋 すべての投稿</button>
  <button class="ghost-button" onclick="window.selectCategory('予定')" style="justify-content:flex-start; width:100%; color:#10b981;">📅 予定</button>
  <button class="ghost-button" onclick="window.selectCategory('宿題')" style="justify-content:flex-start; width:100%; color:#f59e0b;">✏️ 宿題</button>
  <button class="ghost-button" onclick="window.selectCategory('連絡事項')" style="justify-content:flex-start; width:100%; color:#a78bfa;">📢 連絡事項</button>
</div>
</div>
<div class="hamburger-overlay" id="hamburgerOverlay"></div>

<div id="mainContent" style="display: none;">
<main class="shell">
  
  <div class="hero-header-container frosted">
    <div class="hero-card">
      <div id="userAvatarHeader" class="profile-avatar" style="font-size:24px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; background:#fff; border-radius:50%;">👤</div>
      <div>
        <h1 class="hero-title" id="categoryTitle">予定・宿題・連絡</h1>
        <p class="hero-lead" id="heroLead">共有サイト</p>
      </div>
    </div>
    <button class="hamburger-button" id="hamburgerButton">☰</button>
  </div>

  <section class="toolbar frosted">
    <div class="toolbar-row">
      <button class="ghost-button" id="prevDateButton">← 前日</button>
      <div class="date-display" id="dateDisplay">読み込み中...</div>
      <button class="ghost-button" id="nextDateButton">次日 →</button>
    </div>
  </section>

  <section id="adminPostForm" style="display: none;">
    <div class="panel frosted">
      <h3 class="panel-title">✍️ 新規投稿（管理者用）</h3>
      <form id="postForm" style="display: grid; gap: 12px;">
        <input id="postTitle" type="text" placeholder="タイトル" required style="padding:12px; border:1px solid var(--border); border-radius:10px; background:#fff;">
        <textarea id="postBody" placeholder="ここに内容を入力してください..." required style="min-height: 100px; padding:12px; border:1px solid var(--border); border-radius:10px; background:#fff;"></textarea>
        <div class="form-grid-2">
          <select id="postCategory" required style="padding:12px; border:1px solid var(--border); border-radius:10px; background:#fff;">
            <option value="予定">📅 予定</option>
            <option value="宿題">✏️ 宿題</option>
            <option value="連絡事項">📢 連絡事項</option>
          </select>
          <select id="postTarget" required style="padding:12px; border:1px solid var(--border); border-radius:10px; background:#fff;">
            <option value="両方">全体向け</option>
            <option value="7-1">7-1組</option>
            <option value="7-2">7-2組</option>
          </select>
        </div>
        <div class="form-grid-2">
          <input id="postStartDate" type="date" required style="padding:12px; border:1px solid var(--border); border-radius:10px; background:#fff;">
          <input id="postEndDate" type="date" required style="padding:12px; border:1px solid var(--border); border-radius:10px; background:#fff;">
        </div>
        <button type="submit" class="button">タイムラインに投稿する</button>
      </form>
    </div>
  </section>

  <section id="postsContainer" style="margin-top:24px;"></section>
</main>

<div class="admin-footer" id="adminFooter">
  <button class="ghost-button" id="adminDashboardButton" style="display: none;">📊 ダッシュボード</button>
  <button class="ghost-button" id="profileModalButton">👤 プロフィール</button>
  <button class="ghost-button" id="logoutButton">ログアウト</button>
</div>
</div>

<div class="modal hidden" id="profileModal">
<div class="modal-panel">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h3 style="margin:0; font-weight:800;">👤 プロフィール設定</h3>
    <button type="button" id="closeProfileModal" class="ghost-button" style="padding:6px 12px; min-height:32px;">閉じる</button>
  </div>
  <form id="profileEditForm" style="display: grid; gap: 14px;">
    <div>
      <label style="font-size:0.85rem; font-weight:700; color:var(--muted); display:block; margin-bottom:6px;">アバター絵文字または画像URL</label>
      <input id="profileImageUrlInput" type="text" placeholder="例: 😎 または https://..." style="padding:12px; border:1px solid var(--border); border-radius:12px;">
    </div>
    <div>
      <label style="font-size:0.85rem; font-weight:700; color:var(--muted); display:block; margin-bottom:6px;">表示名</label>
      <input id="profileNameInput" type="text" maxlength="30" required placeholder="お名前" style="padding:12px; border:1px solid var(--border); border-radius:12px;">
    </div>
    <button type="submit" class="button" style="margin-top:8px;">設定を保存する</button>
  </form>
</div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc, query, orderBy, limit, increment, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore as initializeFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAkMLCyIC0x9bT63LEih1x7BXe3XYVuknQ",
  authDomain: "school-site-475fc.firebaseapp.com",
  projectId: "school-site-475fc",
  storageBucket: "school-site-475fc.firebasestorage.app",
  messagingSenderId: "69139986081",
  appId: "1:69139986081:web:11c1b1b8277e503e9ee2e0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = initializeFirestore(app);

const ADMIN_UID = "Z4YHNqiKySV3KLkHIjtDaj36WUa2";

const state = {
  user: null,
  isAdmin: false,
  userName: "",
  userClass: "",
  userAvatarUrl: "👤",
  currentDate: new Date(),
  posts: [],
  userReactedMap: {},
  commentsMap: {},
  categoryFilter: "all"
};

function showToast(msg) { const toast = document.getElementById("toast"); toast.textContent = msg; toast.classList.add("show"); setTimeout(() => toast.classList.remove("show"), 2000); }
function getLocalDateString(date) { return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`; }

function updateDateDisplay() {
  const options = { year: "numeric", month: "long", day: "numeric", weekday: "short" };
  document.getElementById("dateDisplay").textContent = state.currentDate.toLocaleDateString("ja-JP", options);
}

function updateUIProfile() {
  document.getElementById("heroLead").textContent = "AKKI によって開発された共有サイト";
  const avatarContainer = document.getElementById("userAvatarHeader");
  if (avatarContainer) {
    avatarContainer.innerHTML = state.userAvatarUrl.startsWith("http") ? `<img src="${state.userAvatarUrl}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">` : state.userAvatarUrl;
  }
}

function renderPosts() {
  const container = document.getElementById("postsContainer");
  const today = getLocalDateString(state.currentDate);

  const filtered = state.posts.filter(post => {
    const matchesClass = state.isAdmin || post.classTarget === "両方" || post.classTarget === state.userClass;
    return matchesClass && (today >= post.startDate && today <= post.endDate) && (state.categoryFilter === "all" || post.category === state.categoryFilter);
  });

  container.innerHTML = filtered.length === 0 ? `<div style="text-align:center; padding:48px 20px; color:var(--muted); background:rgba(255,255,255,0.5); border-radius:16px; border:1px dashed var(--border);">投稿がありません</div>` : filtered.map(post => {
    const reactions = post.reactions || { like: 0, checked: 0, homework_done: 0 };
    
    const isLiked = state.userReactedMap?.[post.id]?.like || false;
    const isChecked = state.userReactedMap?.[post.id]?.checked || false;
    const isHomeworkDone = state.userReactedMap?.[post.id]?.homework_done || false;
    const comments = state.commentsMap[post.id] || [];

    const commentsHTML = comments.map(c => `
    <div style="display:flex; gap:8px; background:rgba(255,255,255,0.5); padding:10px; border-radius:10px; margin-bottom:6px; font-size:0.85rem; border:1px solid rgba(0,0,0,0.02);">
      <div style="font-weight:bold; color:var(--text);">${c.userName}:</div>
      <div style="flex:1; color:#475569;">${c.text}</div>
    </div>`).join("");

    return `
    <div class="post-card">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px;">
        <span style="font-size:0.75rem; font-weight:700; padding:4px 10px; border-radius:999px; background:${post.category === '宿宿題' || post.category === '宿題' ? '#fef3c7; color:#d97706;' : post.category === '予定' ? '#d1fae5; color:#059669;' : '#f3e8ff; color:#7c3aed;'}">${post.category}</span>
        <span style="font-size:0.75rem; color:var(--muted); font-weight:500;">対象: ${post.classTarget === '両方' ? '全体向け' : post.classTarget}</span>
      </div>
      <h3 style="margin:0 0 10px 0; font-size:1.25rem; font-weight:800;">${post.title}</h3>
      <p class="post-body">${post.body}</p>
      
      <div class="reaction-container">
        <button class="ghost-button reaction-btn" data-post-id="${post.id}" data-type="like" style="${isLiked ? 'background:#e0f2fe; border-color:#38bdf8;' : ''}">
          <img src="image_8c3a83.png" class="reaction-icon-img" alt="ロケット"> ロケット ${reactions.like || 0}
        </button>
        <button class="ghost-button reaction-btn" data-post-id="${post.id}" data-type="checked" style="${isChecked ? 'background:#dcfce7; border-color:#4ade80;' : ''}">
          <img src="image_ecf297.png" class="reaction-icon-img" alt="ありがとう"> ありがとう ${reactions.checked || 0}
        </button>
        <button class="ghost-button reaction-btn" data-post-id="${post.id}" data-type="homework_done" style="${isHomeworkDone ? 'background:#fef9c3; border-color:#facc15;' : ''}">
          ✏️ 宿題おわったー ${reactions.homework_done || 0}
        </button>
      </div>

      <div class="comments-area">${commentsHTML}</div>
      <form class="comment-form" data-post-id="${post.id}" style="display:flex; gap:8px; margin-top:12px;">
        <input type="text" class="comment-input" placeholder="コメントを残す..." required style="padding:10px 14px; border:1px solid var(--border); border-radius:12px; font-size:0.85rem; background:#fff;">
        <button type="submit" class="button" style="padding:0 16px; min-height:38px; font-size:0.85rem; width:auto; flex-shrink:0;">送信</button>
      </form>
    </div>`;
  }).join("");
}

document.getElementById("prevDateButton").onclick = () => { state.currentDate.setDate(state.currentDate.getDate() - 1); updateDateDisplay(); renderPosts(); };
document.getElementById("nextDateButton").onclick = () => { state.currentDate.setDate(state.currentDate.getDate() + 1); updateDateDisplay(); renderPosts(); };

document.getElementById("hamburgerButton").onclick = () => { document.getElementById("hamburgerMenu").classList.add("active"); document.getElementById("hamburgerOverlay").classList.add("active"); };
document.getElementById("hamburgerOverlay").onclick = () => { document.getElementById("hamburgerMenu").classList.remove("active"); document.getElementById("hamburgerOverlay").classList.remove("active"); };
window.selectCategory = function(c) { state.categoryFilter = c; document.getElementById("categoryTitle").textContent = c === "all" ? "予定・宿題・連絡" : c; renderPosts(); document.getElementById("hamburgerMenu").classList.remove("active"); document.getElementById("hamburgerOverlay").classList.remove("active"); };

document.getElementById("postsContainer").addEventListener("click", async (e) => {
  const targetBtn = e.target.closest(".reaction-btn");
  if (!targetBtn) return;
  const postId = targetBtn.getAttribute("data-post-id");
  const type = targetBtn.getAttribute("data-type");
  const userReactionRef = doc(db, "userReactions", `${state.user.uid}_${postId}_${type}`);
  const postRef = doc(db, "posts", postId);

  if (!state.userReactedMap) state.userReactedMap = {};
  if (!state.userReactedMap[postId]) state.userReactedMap[postId] = {};
  
  const hasReacted = state.userReactedMap[postId][type] || false;

  try {
    if (hasReacted) {
      await deleteDoc(userReactionRef);
      await updateDoc(postRef, { [`reactions.${type}`]: increment(-1) });
      state.userReactedMap[postId][type] = false;
    } else {
      await setDoc(userReactionRef, { userId: state.user.uid, postId, type, timestamp: serverTimestamp() });
      await updateDoc(postRef, { [`reactions.${type}`]: increment(1) });
      state.userReactedMap[postId][type] = true;
    }
    renderPosts();
  } catch (err) {
    console.error("リアクション反映エラー:", err);
  }
});

document.getElementById("postsContainer").addEventListener("submit", async (e) => {
  const form = e.target.closest(".comment-form");
  if (!form) return; e.preventDefault();
  const postId = form.getAttribute("data-post-id");
  const input = form.querySelector(".comment-input");
  await addDoc(collection(db, "posts", postId, "comments"), { userId: state.user.uid, userName: state.userName, text: input.value.trim(), createdAt: serverTimestamp() });
  input.value = "";
});

document.getElementById("postForm").onsubmit = async (e) => {
  e.preventDefault();
  await addDoc(collection(db, "posts"), {
    title: document.getElementById("postTitle").value.trim(),
    body: document.getElementById("postBody").value.trim(),
    category: document.getElementById("postCategory").value,
    classTarget: document.getElementById("postTarget").value,
    startDate: document.getElementById("postStartDate").value,
    endDate: document.getElementById("postEndDate").value,
    reactions: { like: 0, checked: 0, homework_done: 0 },
    createdAt: serverTimestamp()
  });
  document.getElementById("postForm").reset();
  showToast("タイムラインへ投稿しました！");
};

document.getElementById("profileModalButton").onclick = () => { document.getElementById("profileNameInput").value = state.userName; document.getElementById("profileImageUrlInput").value = state.userAvatarUrl; document.getElementById("profileModal").classList.remove("hidden"); };
document.getElementById("closeProfileModal").onclick = () => { document.getElementById("profileModal").classList.add("hidden"); };

document.getElementById("profileEditForm").onsubmit = async (e) => {
  e.preventDefault();
  const newName = document.getElementById("profileNameInput").value.trim();
  const newAvatar = document.getElementById("profileImageUrlInput").value.trim() || "👤";
  state.userName = newName;
  state.userAvatarUrl = newAvatar;
  if (state.user && state.user.uid !== ADMIN_UID) {
    await updateDoc(doc(db, "allowedUsers", state.user.email), { name: newName, avatarUrl: newAvatar });
    localStorage.setItem(`user_setup_${state.user.uid}`, JSON.stringify({ name: newName, class: state.userClass, avatarUrl: newAvatar }));
  }
  updateUIProfile(); renderPosts();
  document.getElementById("profileModal").classList.add("hidden");
  showToast("プロフィールを変更しました！");
};

document.addEventListener("submit", async (e) => {
  if (e.target.id === "emailLoginForm") {
    e.preventDefault();
    try {
      await signInWithEmailAndPassword(auth, document.getElementById("emailInput").value, document.getElementById("passwordInput").value);
    } catch {
      await createUserWithEmailAndPassword(auth, document.getElementById("emailInput").value, document.getElementById("passwordInput").value);
    }
  }
  if (e.target.id === "termsForm") { e.preventDefault(); localStorage.setItem(`user_terms_agreed_${state.user.uid}`, "true"); document.getElementById("termsModal").classList.add("hidden"); proceedToNextStepAfterLogin(state.user); }
  if (e.target.id === "setupForm") {
    e.preventDefault();
    state.userName = document.getElementById("setupName").value; state.userClass = document.getElementById("setupClass").value;
    await setDoc(doc(db, "pendingUsers", state.user.email), { email: state.user.email, name: state.userName, class: state.userClass, avatarUrl: "👤", requestedAt: serverTimestamp() });
    document.getElementById("setupModal").classList.add("hidden"); checkApprovalStatus(state.user);
  }
});

function initPosts() {
  onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(100)), (snapshot) => {
    state.posts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    snapshot.docs.forEach(postDoc => {
      onSnapshot(query(collection(db, "posts", postDoc.id, "comments"), orderBy("createdAt", "asc")), (commentSnap) => {
        state.commentsMap[postDoc.id] = commentSnap.docs.map(cDoc => ({ id: cDoc.id, ...cDoc.data() })); renderPosts();
      });
    });
    renderPosts();
  });
}

function initUserReactions() {
  onSnapshot(collection(db, "userReactions"), (snapshot) => {
    state.userReactedMap = {};
    snapshot.docs.forEach(doc => { 
      const d = doc.data(); 
      if (d.userId === state.user?.uid) { 
        if (!state.userReactedMap[d.postId]) state.userReactedMap[d.postId] = {}; 
        state.userReactedMap[d.postId][d.type] = true; 
      } 
    });
    renderPosts();
  });
}

function checkApprovalStatus(user) {
  onSnapshot(doc(db, "allowedUsers", user.email), (snapshot) => {
    if (snapshot.exists()) {
      const data = snapshot.data();
      if (data.status === "suspended") { document.getElementById("suspendedModal").classList.remove("hidden"); document.getElementById("mainContent").style.display = "none"; return; }
      document.getElementById("suspendedModal").classList.add("hidden");
      state.userName = data.name; state.userClass = data.class; state.userAvatarUrl = data.avatarUrl || "👤";
      localStorage.setItem(`user_setup_${user.uid}`, JSON.stringify({ name: state.userName, class: state.userClass, avatarUrl: state.userAvatarUrl }));
      document.getElementById("pendingApprovalModal").classList.add("hidden"); document.getElementById("mainContent").style.display = "block";
      updateDateDisplay(); updateUIProfile(); initPosts(); initUserReactions();
    } else {
      document.getElementById("pendingApprovalModal").classList.remove("hidden"); document.getElementById("mainContent").style.display = "none";
    }
  });
}

function proceedToNextStepAfterLogin(user) {
  if (user.uid === ADMIN_UID) {
    state.isAdmin = true; state.userName = "管理者"; state.userClass = "管理"; state.userAvatarUrl = "👑";
    document.getElementById("mainContent").style.display = "block"; document.getElementById("adminPostForm").style.display = "block";
    const dashBtn = document.getElementById("adminDashboardButton"); if(dashBtn) dashBtn.style.display = "inline-flex";
    updateDateDisplay(); updateUIProfile(); initPosts(); initUserReactions(); return;
  }
  const savedSetup = localStorage.getItem(`user_setup_${user.uid}`);
  if (!savedSetup) { document.getElementById("setupModal").classList.remove("hidden"); return; }
  const setup = JSON.parse(savedSetup); state.userName = setup.name; state.userClass = setup.class; state.userAvatarUrl = setup.avatarUrl || "👤";
  checkApprovalStatus(user);
}

onAuthStateChanged(auth, (user) => {
  if (!user) { document.querySelectorAll(".modal").forEach(m => m.id !== "loginModal" && m.classList.add("hidden")); document.getElementById("loginModal").classList.remove("hidden"); document.getElementById("mainContent").style.display = "none"; return; }
  state.user = user; document.getElementById("loginModal").classList.add("hidden");
  if (!localStorage.getItem(`user_terms_agreed_${user.uid}`)) { document.getElementById("termsModal").classList.remove("hidden"); return; }
  proceedToNextStepAfterLogin(user);
});

document.getElementById("logoutButton").onclick = () => signOut(auth);
document.getElementById("pendingLogoutButton").onclick = () => signOut(auth);
document.getElementById("suspendedLogoutButton").onclick = () => signOut(auth);
</script>
</body>
</html>
